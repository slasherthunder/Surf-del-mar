backend:
  name: git-gateway
  branch: main

# Test locally with: npx decap-server (then open http://localhost:8080/admin)
local_backend: true

media_folder: "public/assets/images"
public_folder: "/assets/images"

locale: "en"

collections:
  - name: "calendar"
    label: "Calendar"
    files:
      - name: "schedule"
        label: "Festival Schedule"
        file: "content/calendar.md"
        fields:
          - { label: "Title", name: "title", widget: "string", default: "Festival Schedule" }
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "photos"
    label: "Photos"
    folder: "content/photos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Caption", name: "caption", widget: "string", required: false }
